<!-- TIP / DONATION alert — StreamElements AlertBox custom HTML
     {{name}} = tipper username
     {{amount}} = tip amount (e.g. "10.00") — prefix the $ in data-kind below
     Edit data-kind / data-sub freely. -->
<div id="alertroot" data-side="left">
  <div id="fxlayer"></div>
  <div id="alerthost"
       data-kind="${{amount}} TIP"
       data-name="{{name}}"
       data-sub="straight to the vault"></div>
</div>
