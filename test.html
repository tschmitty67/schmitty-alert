<!-- BITS / CHEER alert — StreamElements AlertBox custom HTML
     {{name}} = cheer username
     {{amount}} = bit count (e.g. "500")
     Edit data-kind / data-sub freely. -->
<div id="alertroot" data-side="left">
  <div id="fxlayer"></div>
  <div id="alerthost"
       data-kind="{{amount}} BITS"
       data-name="{{name}}"
       data-sub="absolutely buried him"></div>
</div>
