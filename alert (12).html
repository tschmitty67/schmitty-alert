<!-- RAID alert — StreamElements AlertBox custom HTML
     {{name}} = raiding channel name
     {{amount}} = raider count (e.g. "42")
     Edit data-kind / data-sub freely. -->
<div id="alertroot" data-side="left">
  <div id="fxlayer"></div>
  <div id="alerthost"
       data-kind="RAID · {{amount}}"
       data-name="{{name}}"
       data-sub="the squad has arrived"></div>
</div>
